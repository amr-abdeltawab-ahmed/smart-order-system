services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: smart_order_app
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: smart_order
      DB_USERNAME: laravel
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required in .env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
    volumes:
      - .:/var/www/html
    networks:
      - smart_order_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  webserver:
    image: nginx:alpine
    container_name: smart_order_nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - smart_order_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: smart_order_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: smart_order
      MYSQL_USER: laravel
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required in .env}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3309:3306"
    networks:
      - smart_order_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smart_order_redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6380:6379"
    networks:
      - smart_order_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  smart_order_network:
    driver: bridge

volumes:
  db_data:
